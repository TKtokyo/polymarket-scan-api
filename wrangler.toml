name = "polymarket-scan-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "SCAN_KV"
id = "1c6cdb8d8891442a84ee61cc178de55a"

[triggers]
crons = ["* * * * *"]

[[services]]
binding = "LIQUIDITY_API"
service = "polymarket-liquidity-api"

[[r2_buckets]]
binding = "SCAN_R2"
bucket_name = "polymarket-scan-history"

[assets]
directory = "public"
